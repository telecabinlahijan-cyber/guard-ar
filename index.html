<a-assets>

  <video
    id="logoVideo"
    src="./LOGOMOTION.mp4"
    preload="auto"
    autoplay
    loop
    muted
    playsinline
    webkit-playsinline>
  </video>

</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex:0">

  <a-gltf-model
    src="#guardModel"
    position="0 0.4 0"
    scale="0.05 0.05 0.05">
  </a-gltf-model>

  <a-video
    src="#logoVideo"
    position="0 -0.4 0"
    width="1.4"
    height="0.8">
  </a-video>

</a-entity>
